name: Integration Tests | Kinesis
on:
  workflow_dispatch:
    inputs:
      ios:
        description: '📱 iOS'
        required: true
        default: true
        type: boolean
      tvos:
        description: '📺 tvOS'
        required: true
        default: true
        type: boolean
      watchos:
        description: '⌚️ watchOS'
        required: true
        default: true
        type: boolean
  workflow_call:

permissions:
    id-token: write
    contents: read

jobs:
  kinesis-integration-tests:
    name: Kinesis Integration Tests
    strategy:
      fail-fast: false
      matrix:
        platform: [iOS, tvOS, watchOS]
        exclude:
          - platform: ${{ github.event.inputs.ios == 'false' && 'iOS' || 'None' }}
          - platform: ${{ github.event.inputs.tvos == 'false' && 'tvOS' || 'None' }}
          - platform: ${{ github.event.inputs.watchos == 'false' && 'watchOS' || 'None' }}
    uses: ./.github/workflows/run_integration_tests.yml
    with:
      scheme: AWSKinesisStreamsPluginIntegrationTests
      platform: ${{ matrix.platform }}
      project_path: ./AmplifyPlugins/Analytics/Tests/KinesisHostApp
      resource_subfolder: kinesis
      timeout-minutes: 30
    secrets: inherit
